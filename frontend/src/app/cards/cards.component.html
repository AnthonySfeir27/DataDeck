<div class="cards-container">
  <div class="cards-header">
    <h1>Cards</h1>
    <button class="btn-create" (click)="openCreateModal()">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14m-7-7h14"></path>
      </svg>
      Create Card
    </button>
  </div>

  <div class="cards-grid" *ngIf="cards.length > 0">
    <app-card *ngFor="let card of cards" [card]="card" (cardClick)="onCardClick($event)"></app-card>
  </div>

  <div class="empty-state" *ngIf="cards.length === 0">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 16V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"></path>
      <polyline points="7 10 12 13 17 10"></polyline>
    </svg>
    <h2>No cards yet</h2>
    <p>Create your first card to get started</p>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" *ngIf="showCreateModal" (click)="closeCreateModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Create New Card</h2>
      <button class="btn-close" (click)="closeCreateModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="title">Title</label>
        <input
          type="text"
          id="title"
          [(ngModel)]="newCard.title"
          placeholder="Enter card title"
          required
        />
      </div>

      <div class="form-group">
        <label>Image</label>
        <div class="image-upload-toggle">
          <button 
            type="button"
            class="toggle-btn" 
            [class.active]="imageUploadMethod === 'url'"
            (click)="imageUploadMethod = 'url'; newCard.image_data = ''">
            URL
          </button>
          <button 
            type="button"
            class="toggle-btn" 
            [class.active]="imageUploadMethod === 'file'"
            (click)="imageUploadMethod = 'file'; newCard.image_url = ''">
            Upload File
          </button>
        </div>
        
        <input
          *ngIf="imageUploadMethod === 'url'"
          type="text"
          [(ngModel)]="newCard.image_url"
          placeholder="Enter image URL"
        />
        
        <input
          *ngIf="imageUploadMethod === 'file'"
          type="file"
          accept="image/*"
          (change)="onFileSelected($event, false)"
          class="file-input"
        />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          [(ngModel)]="newCard.description"
          placeholder="Enter card description"
          rows="4"
        ></textarea>
      </div>

      <div class="form-group" *ngIf="availableTags.length > 0">
        <label>Tags</label>
        <div class="tag-selection">
          <button
            type="button"
            *ngFor="let tag of availableTags"
            class="tag-select-btn"
            [class.selected]="isTagSelected(tag.name, false)"
            (click)="toggleTag(tag.name, false)">
            {{ tag.name }}
          </button>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeCreateModal()">Cancel</button>
      <button class="btn-primary" (click)="createCard()">Create</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-overlay" *ngIf="showViewModal" (click)="closeViewModal()">
  <div class="modal-content modal-large" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ selectedCard?.title }}</h2>
      <button class="btn-close" (click)="closeViewModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="modal-body modal-body-scrollable">
      <div class="view-image" *ngIf="selectedCard?.image_url || selectedCard?.image_data">
        <img [src]="getImageSource(selectedCard)" [alt]="selectedCard.title" />
      </div>
      <div class="view-section" *ngIf="selectedCard?.description">
        <h3>Description</h3>
        <p>{{ selectedCard.description }}</p>
      </div>
      <div class="view-section" *ngIf="selectedCard?.tags && selectedCard.tags.length > 0">
        <h3>Tags</h3>
        <div class="tags-list">
          <span class="tag" *ngFor="let tag of selectedCard.tags">{{ tag }}</span>
        </div>
      </div>
      <div class="view-section" *ngIf="selectedCard?.master_tag">
        <h3>Master Tag</h3>
        <span class="master-tag">{{ selectedCard.master_tag }}</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-delete" (click)="deleteCard()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Delete
      </button>
      <button class="btn-primary" (click)="openEditModal()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        Edit
      </button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" *ngIf="showEditModal" (click)="closeEditModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Edit Card</h2>
      <button class="btn-close" (click)="closeEditModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="edit-title">Title</label>
        <input
          type="text"
          id="edit-title"
          [(ngModel)]="editCard.title"
          placeholder="Enter card title"
          required
        />
      </div>

      <div class="form-group">
        <label>Image</label>
        <div class="image-upload-toggle">
          <button 
            type="button"
            class="toggle-btn" 
            [class.active]="editImageUploadMethod === 'url'"
            (click)="editImageUploadMethod = 'url'; editCard.image_data = ''">
            URL
          </button>
          <button 
            type="button"
            class="toggle-btn" 
            [class.active]="editImageUploadMethod === 'file'"
            (click)="editImageUploadMethod = 'file'; editCard.image_url = ''">
            Upload File
          </button>
        </div>
        
        <input
          *ngIf="editImageUploadMethod === 'url'"
          type="text"
          [(ngModel)]="editCard.image_url"
          placeholder="Enter image URL"
        />
        
        <input
          *ngIf="editImageUploadMethod === 'file'"
          type="file"
          accept="image/*"
          (change)="onFileSelected($event, true)"
          class="file-input"
        />
      </div>

      <div class="form-group">
        <label for="edit-description">Description</label>
        <textarea
          id="edit-description"
          [(ngModel)]="editCard.description"
          placeholder="Enter card description"
          rows="4"
        ></textarea>
      </div>

      <div class="form-group" *ngIf="availableTags.length > 0">
        <label>Tags</label>
        <div class="tag-selection">
          <button
            type="button"
            *ngFor="let tag of availableTags"
            class="tag-select-btn"
            [class.selected]="isTagSelected(tag.name, true)"
            (click)="toggleTag(tag.name, true)">
            {{ tag.name }}
          </button>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeEditModal()">Cancel</button>
      <button class="btn-primary" (click)="updateCard()">Save Changes</button>
    </div>
  </div>
</div>
