<div class="account-container">
  <div class="account-card">
    <!-- Header -->
    <div class="account-header">
      <div class="avatar-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h1>{{ username }}</h1>
      <p class="account-subtitle">Manage your account</p>
    </div>

    <!-- Success / Error Messages -->
    <div class="success-message" *ngIf="successMessage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
      {{ successMessage }}
    </div>
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

    <!-- Username -->
    <div class="section">
      <h3 class="section-title">Username</h3>
      <div class="info-row" *ngIf="!editingUsername">
        <span class="info-value">{{ username }}</span>
        <button class="btn-edit" (click)="startEditUsername()">Edit</button>
      </div>
      <div class="edit-row" *ngIf="editingUsername">
        <input type="text" [(ngModel)]="newUsername" placeholder="New username" />
        <div class="edit-actions">
          <button class="btn-save" (click)="saveUsername()" [disabled]="isLoading">Save</button>
          <button class="btn-cancel-sm" (click)="cancelEditUsername()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Email -->
    <div class="section">
      <h3 class="section-title">Email</h3>
      <div class="info-row" *ngIf="!editingEmail">
        <span class="info-value">{{ email || 'Not set' }}</span>
        <button class="btn-edit" (click)="startEditEmail()">Edit</button>
      </div>
      <div class="edit-row" *ngIf="editingEmail">
        <input type="email" [(ngModel)]="newEmail" placeholder="New email" />
        <div class="edit-actions">
          <button class="btn-save" (click)="saveEmail()" [disabled]="isLoading">Save</button>
          <button class="btn-cancel-sm" (click)="cancelEditEmail()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Password -->
    <div class="section">
      <h3 class="section-title">Password</h3>
      <div class="info-row" *ngIf="!showPasswordForm">
        <span class="info-value">••••••••</span>
        <button class="btn-edit" (click)="togglePasswordForm()">Change</button>
      </div>
      <div class="password-form" *ngIf="showPasswordForm">
        <div class="form-field">
          <label>Current Password</label>
          <input type="password" [(ngModel)]="currentPassword" placeholder="Enter current password" />
        </div>
        <div class="form-field">
          <label>New Password</label>
          <input type="password" [(ngModel)]="newPassword" placeholder="Enter new password (min 6 chars)" />
        </div>
        <div class="form-field">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm new password" />
        </div>
        <div class="edit-actions">
          <button class="btn-save" (click)="onChangePassword()" [disabled]="isLoading">
            {{ isLoading ? 'Saving...' : 'Update Password' }}
          </button>
          <button class="btn-cancel-sm" (click)="togglePasswordForm()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Logout -->
    <button class="btn-logout" (click)="onLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Log Out
    </button>
  </div>
</div>
